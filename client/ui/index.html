<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avalon</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header id="appHeader">
  <div class="header-brand">
    <h1>Avalon</h1>
    <div class="subtitle">Your AI working harness</div>
  </div>
  <div class="model-select">
    <label for="model">Model</label>
    <select id="model"></select>
    <button class="preload-btn" id="preloadBtn">Preload</button>
    <button class="settings-btn" id="resetChatBtn" title="Clear Chat">&#x2715;</button>
    <button class="settings-btn" id="vaultBtn" title="Vault">&#x1F5C3;</button>
    <button class="settings-btn" id="agentBtn" title="Agents">&#x1F916;</button>
    <button class="settings-btn" id="mapBtn" title="Project Map">&#x26F6;</button>
    <button class="settings-btn" id="settingsBtn" title="Settings">&#x2699;</button>
    <button class="settings-btn" id="logoutBtn" title="Logout" style="display:none;">&#x21BA;</button>
  </div>
  <div class="window-controls">
    <button class="win-btn minimize" id="winMinBtn" title="Minimize">&#x2013;</button>
    <button class="win-btn maximize" id="winMaxBtn" title="Maximize">&#x25A1;</button>
    <button class="win-btn close" id="winCloseBtn" title="Close">&#x2715;</button>
  </div>
</header>

<div class="main">
  <div class="chat-area">
    <div class="chat-history" id="chatHistory"></div>

    <div class="permission-panel" id="permPanel">
      <h3>Permission Required</h3>
      <div class="permission-info" id="permInfo"></div>
      <div class="permission-actions">
        <button class="perm-btn approve" id="permApprove">Approve</button>
        <button class="perm-btn deny" id="permDeny">Deny</button>
      </div>
    </div>

    <div class="input-bar">
      <textarea id="userInput" rows="1" placeholder="Ask anything..." spellcheck="true" autofocus></textarea>
      <button class="fetch-btn" id="fetchBtn" title="Direct Fetch">&#x2193;</button>
      <button class="send-btn" id="sendBtn">Send</button>
      <button class="stop-btn hidden" id="stopBtn" title="Stop">&#x25A0;</button>
    </div>
  </div>

  <div class="settings-panel hidden" id="settingsPanel">
    <div class="settings-header">
      <span>Settings</span>
      <button class="settings-close" id="settingsCloseBtn">&#x2715;</button>
    </div>
    <div class="settings-body" id="settingsBody"></div>
  </div>

  <!-- Mindmap viewer -->
  <div class="mindmap-overlay hidden" id="mindmapOverlay">
    <div class="mindmap-header">
      <div class="mindmap-tabs">
        <button class="mindmap-tab active" id="tabLocal" data-tab="local">Local</button>
        <button class="mindmap-tab" id="tabRemote" data-tab="remote">Remote</button>
      </div>
      <div class="mindmap-actions">
        <button id="mindmapZoomOutBtn">–</button>
        <button id="mindmapZoomInBtn">+</button>
        <button id="mindmapRefreshBtn">Refresh</button>
        <button id="mindmapResetBtn">Reset</button>
        <button id="mindmapMergeBtn" class="hidden">Merge</button>
        <button id="mindmapClearBtn" class="hidden">Clear</button>
        <button id="mindmapCloseBtn">&#x2715;</button>
      </div>
    </div>
    <div class="mindmap-container" id="mindmapContainer">
      <svg id="mindmapSvg" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div class="mindmap-legend">
      <span><span class="legend-dot dir"></span> Directory</span>
      <span><span class="legend-dot file"></span> File</span>
      <span><span class="legend-dot image"></span> Image</span>
      <span><span class="legend-dot root"></span> Root</span>
    </div>
  </div>

  <!-- Audit overlay -->
  <div class="mindmap-overlay hidden" id="auditOverlay">
    <div class="mindmap-header">
      <span>Audit Sessions</span>
      <div class="mindmap-actions">
        <button id="auditRefreshBtn">Refresh</button>
        <button id="auditCloseBtn">&#x2715;</button>
      </div>
    </div>
    <div class="mindmap-container" id="auditContainer" style="padding: 20px; overflow-y: auto;">
      <div id="auditContent"></div>
    </div>
  </div>

  <!-- Vault overlay -->
  <div class="mindmap-overlay hidden" id="vaultOverlay">
    <div class="mindmap-header">
      <div class="mindmap-tabs">
        <button class="mindmap-tab active" id="tabVaultDocs" data-tab="docs">Documents</button>
        <button class="mindmap-tab" id="tabVaultImages" data-tab="images">Images</button>
        <button class="mindmap-tab" id="tabVaultGraph" data-tab="graph">Graph</button>
      </div>
      <div class="mindmap-actions">
        <button id="vaultCloseBtn">&#x2715;</button>
      </div>
    </div>
    <div class="vault-container" id="vaultContainer">
      <div class="vault-search-bar" id="vaultSearchBar">
        <input type="text" id="vaultSearchInput" placeholder="Search vault..." />
        <button id="vaultSearchBtn">Search</button>
      </div>
      <div class="vault-results" id="vaultResults"></div>
      <div class="mindmap-container hidden" id="vaultGraphContainer" style="height: calc(100% - 50px);">
        <div class="graph-toolbar" id="graphToolbar">
          <button class="graph-tool-btn" id="graphZoomOut" title="Zoom out">-</button>
          <span class="graph-zoom-label" id="graphZoomLabel">100%</span>
          <button class="graph-tool-btn" id="graphZoomIn" title="Zoom in">+</button>
          <div class="graph-tool-sep"></div>
          <button class="graph-tool-btn" id="graphFit" title="Fit to view">Fit</button>
          <button class="graph-tool-btn" id="graphReset" title="Reset view">Reset</button>
          <div class="graph-tool-sep"></div>
          <button class="graph-tool-btn" id="graphOutlineToggle" title="Toggle outline">Outline</button>
          <button class="graph-tool-btn" id="graphThemeToggle" title="Switch theme">Theme</button>
          <div class="graph-tool-sep"></div>
          <button class="graph-tool-btn" id="graphExportSvg" title="Export SVG">SVG</button>
          <button class="graph-tool-btn" id="graphExportPng" title="Export PNG">PNG</button>
          <button class="graph-tool-btn" id="graphExportJson" title="Export JSON">JSON</button>
        </div>
        <div class="graph-layout">
          <div class="graph-sidebar hidden" id="graphSidebar">
            <div class="graph-sidebar-header">Outline</div>
            <div class="graph-outline-tree" id="graphOutlineTree"></div>
          </div>
          <div class="graph-canvas-wrapper">
            <svg id="vaultGraphSvg" xmlns="http://www.w3.org/2000/svg"></svg>
            <div class="graph-tooltip hidden" id="graphTooltip"></div>
          </div>
          <div class="graph-detail-panel hidden" id="graphDetailPanel">
            <div class="graph-detail-header">
              <span class="graph-detail-title" id="graphDetailTitle">Details</span>
              <button class="graph-detail-close" id="graphDetailClose">&#x2715;</button>
            </div>
            <div class="graph-detail-content" id="graphDetailContent"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Agent overlay -->
  <div class="mindmap-overlay hidden" id="agentOverlay">
    <div class="mindmap-header">
      <span>Agent Management</span>
      <div class="mindmap-actions">
        <button id="agentRefreshBtn">Refresh</button>
        <button id="agentCloseBtn">&#x2715;</button>
      </div>
    </div>
    <div class="vault-container" id="agentContainer" style="padding: 20px; overflow-y: auto;">
      <div id="agentContent"></div>
    </div>
  </div>

  <!-- Debug panel -->
  <div class="debug-panel collapsed" id="debugPanel">
    <div class="debug-toggle" id="debugToggle">
      <span class="debug-toggle-icon">&#9654;</span>
      <span class="debug-label">Debug</span>
      <div class="debug-header-actions">
        <button class="debug-btn" id="debugMindMapBtn">Mindmap</button>
        <button class="debug-btn" id="debugAuditBtn">Audit</button>
        <button class="debug-btn" id="debugSaveBtn">Save</button>
        <button class="debug-btn" id="debugClearBtn">Clear</button>
      </div>
    </div>
    <div class="debug-content" id="debugContent"></div>
  </div>
</div>

<div class="status-bar" id="statusBar">
  <span><span class="dot" id="statusDot"></span><span id="statusText">Loading models...</span><button class="reconnect-btn hidden" id="reconnectBtn">Reconnect</button></span>
  <span id="iterCount"></span>
  <button class="restart-btn" id="restartBtn" title="Restart Backend">&#x21bb;</button>
</div>

  <div class="spell-menu hidden" id="spellMenu"></div>

<!-- Login overlay -->
<div id="loginOverlay" class="hidden" style="position:fixed;inset:0;background:rgba(10,10,15,0.95);display:flex;align-items:center;justify-content:center;z-index:9999;">
  <div style="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:40px;width:360px;max-width:90vw;text-align:center;">
    <h2 style="color:var(--text);margin:0 0 8px;font-size:1.5rem;">Avalon Login</h2>
    <div id="loginUserDisplay" style="color:var(--muted);font-size:0.85rem;margin-bottom:20px;"></div>
    <div id="loginError" style="color:#ef4444;font-size:0.85rem;min-height:20px;margin-bottom:12px;"></div>
    <div style="margin-bottom:16px;">
      <input type="text" id="loginUsername" placeholder="Username" autocomplete="username"
        style="width:100%;padding:10px 12px;background:var(--panel2);color:var(--text);border:1px solid var(--border);border-radius:8px;box-sizing:border-box;font-size:0.95rem;" />
    </div>
    <div style="margin-bottom:20px;">
      <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password"
        style="width:100%;padding:10px 12px;background:var(--panel2);color:var(--text);border:1px solid var(--border);border-radius:8px;box-sizing:border-box;font-size:0.95rem;" />
    </div>
    <button id="loginSubmit" style="width:100%;padding:12px;background:#3a6a3a;color:#fff;border:none;border-radius:8px;font-size:1rem;cursor:pointer;">Sign In</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
